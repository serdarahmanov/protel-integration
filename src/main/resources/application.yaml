spring:
  application:
    name: protel-api
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
  security:
    user:
      name: ${API_BASIC_USER}
      password: ${API_BASIC_PASS}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false



server:
  port: 8085
  address: 127.0.0.1
  forward-headers-strategy: framework



protel:
  base-url: https://YOUR-PROTEL-BASE-URL
  api-key: ${PROTEL_API_KEY}
  max-responses: 500
  overlap-seconds: 600
  direct-booking:
    distribution-channels:
          - "WEB"



wordpress:
  base-url: https://limehousehotel.com
  award-endpoint: /wp-json/protel/v1/award-points
  shared-secret: ${WP_SHARED_SECRET}
  timeout-seconds: 15

